<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgileBoard — Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-card">
        <h2>AgileBoard</h2>
        <p>Gerencie suas tarefas com facilidade</p>

        <div class="erro-geral" id="erroGeral">
            Usuário ou senha incorretos.
        </div>

        <form id="formLogin">
            <div class="campo">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" placeholder="Digite seu usuário">
                <span class="mensagem-erro" id="erroUsuario">Campo obrigatório.</span>
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha">
                <span class="mensagem-erro" id="erroSenha">Campo obrigatório.</span>
            </div>

            <button type="submit" class="btn btn-primary btn-login">Entrar</button>
        </form>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
